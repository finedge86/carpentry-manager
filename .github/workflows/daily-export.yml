name: Daily Export Email

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily export
        env:
          SUPABASE_URL: https://bqljghqeodliivjupgqw.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: buskandar442@hotmail.com
        run: node .github/scripts/daily-export.js
